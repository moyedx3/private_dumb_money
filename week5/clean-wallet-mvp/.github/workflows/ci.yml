name: ci
on:
  push:
    paths: ['week5/clean-wallet-mvp/**']
  pull_request:
    paths: ['week5/clean-wallet-mvp/**']
jobs:
  rust:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: week5/clean-wallet-mvp } }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test
