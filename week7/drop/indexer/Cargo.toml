[package]
name = "drop-indexer"
version = "0.1.0"
edition = "2021"

[lib]
name = "drop_indexer"
path = "src/lib.rs"

[dependencies]
anyhow = "1"
async-trait = "0.1"
tokio = { version = "1", features = ["full"] }
tonic = { version = "0.11", features = ["tls", "tls-webpki-roots"] }
prost = "0.12"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[build-dependencies]
tonic-build = "0.11"
protoc-bin-vendored = "3"
