# 로컬 dstack TEE simulator 와 함께 스캐너를 띄우는 compose.
#
# 동작:
# - dstack-simulator 컨테이너가 /shared/dstack.sock 을 emit.
# - scanner 컨테이너가 ATTESTATION_MODE=phala 로 그 socket 에 붙어 *진짜 PhalaAttestation
#   코드 경로*를 검증 (실 TDX 하드웨어 없이 mock quote 받음).
# - 즉 Phala 배포 시 실행되는 코드 그대로지만, 진짜 attestation 만 mock.
#
# 사용:
#   docker compose -f docker-compose.local-tee.yml up --build
#
# 검증 (다른 터미널):
#   curl http://localhost:8080/health
#   → {"status":"ok","attestationMode":"phala","transport":"https-ra-tls"}
#   (실 RA-TLS cert 도 simulator 가 발급 — submit-ufvk 로 검증 가능)
#
# 본 시뮬레이터: https://github.com/Dstack-TEE/dstack/tree/master/sdk/simulator
# (이미지 빌드는 ./build.sh 가 만든 binary 를 thin image 로 감쌈)

services:
  dstack-sim:
    # dstack 의 공식 simulator 이미지가 publicly published 되지 않은 경우 직접 빌드 필요.
    # 또는 호스트에서 simulator 띄우고 socket 만 마운트 (간단).
    # 여기서는 빌드 + 운영 컨테이너로 사용.
    build:
      context: ./infra/dstack-simulator
      dockerfile: Dockerfile
    volumes:
      - dstack-sock:/shared
    healthcheck:
      test: ["CMD", "test", "-S", "/shared/dstack.sock"]
      interval: 2s
      timeout: 1s
      retries: 30

  scanner:
    build:
      context: .
      dockerfile: apps/scanner/Dockerfile
    depends_on:
      dstack-sim:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - ATTESTATION_MODE=phala
      - DSTACK_ENDPOINT=/shared/dstack.sock
      - RATLS_ALT_NAMES=localhost
    volumes:
      - dstack-sock:/shared:ro

volumes:
  dstack-sock:
