# AWS Amplify Hosting 빌드 설정 (모노레포).
#
# Amplify 콘솔에서 이 레포를 연결할 때 "App root directory" = apps/web 로 지정하거나,
# 모노레포 자동감지가 이 파일의 appRoot 를 사용한다.
#
# npm workspaces 라서 의존성 설치는 레포 루트에서 해야 한다 (cd ../..).
# Next.js SSR 은 Amplify 가 자동 감지하며 산출물은 apps/web/.next 다.
#
# 런타임 환경변수(ARTIFACTS_TABLE, AWS_REGION 등)는 Amplify 콘솔의
# Environment variables 에 설정한다. (docs/deploy-web-amplify.md §3)
version: 1
applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - nvm use 22 || nvm install 22
            - cd ../..
            - npm ci
        build:
          commands:
            - cd ../..
            - npm run build --workspace @clean-wallet/web
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - ../../node_modules/**/*
